[project]
name = "metis-ai"
version = "0.1.0"
description = "Metis: local-first AI dev agent. Canonical types, event bus, adapters, routing, tools, memory, sessions, pricing, HTTP/WebSocket server, transparent provider-shape gateway, and CLI/TUI. Installs as `pip install metis-ai`; imported as `metis`."
authors = [
    { name = "David Ji", email = "david.ji.2814@gmail.com" }
]
license = "Apache-2.0"
requires-python = ">=3.13"
dependencies = [
    "msgspec>=0.19.0",
    "python-ulid>=3.0.0",
    "jsonschema>=4.23.0",
    "anthropic>=0.40.0",
    "openai>=1.55.0",
    "httpx>=0.27.0",
    "pyyaml>=6.0",
    "prometheus-client>=0.20.0",
    "starlette>=0.41.0",
    "uvicorn>=0.32.0",
    "textual>=0.86.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
metis = "metis.cli.main:main"

[build-system]
requires = ["uv_build>=0.10.0,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
# Distribution name (`metis-ai`) differs from the importable package name
# (`metis`). uv_build infers the package from the distribution name by
# default; this override tells it to ship `src/metis/` instead.
module-name = "metis"
