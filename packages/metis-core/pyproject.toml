[project]
name = "metis-core"
version = "0.1.0"
description = "Core canonical types, event bus, adapters, routing, tools, memory, sessions, and pricing for Metis."
authors = [
    { name = "David Ji", email = "david.ji.2814@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "msgspec>=0.19.0",
    "python-ulid>=3.0.0",
    "jsonschema>=4.23.0",
    "anthropic>=0.40.0",
    "openai>=1.55.0",
    "httpx>=0.27.0",
    "pyyaml>=6.0",
]

[build-system]
requires = ["uv_build>=0.10.0,<0.11.0"]
build-backend = "uv_build"
