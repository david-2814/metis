# Default values for the metis-gateway chart.
#
# The gateway is per-request stateless (gateway.md §2). Wave 13 lifted the
# loopback-only bind constraint (gateway-hardening.md §2.1) — by default
# the chart still binds 127.0.0.1 inside the pod via a socat sidecar
# bridge (back-compat preserved), but `gatewayHost` can be flipped to
# 0.0.0.0 to skip the sidecar and bind the pod IP directly.
#
# Two pod-network consequences the chart has to bridge:
#
# 1. A Kubernetes Service forwards to pod-IP:targetPort, not to 127.0.0.1.
#    When `gatewayHost` is `127.0.0.1` (default), the chart runs a tiny
#    socat sidecar in the same pod that listens on 0.0.0.0:proxy.listenPort
#    and forwards to 127.0.0.1:gatewayPort. Sidecars share the pod's
#    network namespace, so the gateway's loopback IS the sidecar's loopback.
#    When `gatewayHost` is `0.0.0.0`, the sidecar is unnecessary —
#    set `proxy.enabled: false`.
# 2. kubelet HTTP probes run from the NODE's network namespace and target
#    the pod IP — they cannot reach 127.0.0.1 inside the container. The
#    chart uses `exec` probes (`curl 127.0.0.1`) so they work whether or
#    not the sidecar is enabled.
#
# For TLS:
# - Recommended (`tls.enabled: false` + Ingress with TLS): terminate at
#   an Ingress / cloud LB in front of the Service.
# - Alternative (`tls.enabled: true`): mount a cert + key Secret into the
#   gateway pod for in-process TLS termination. uvicorn terminates;
#   no sidecar needed.
# See docs/gateway-deployment.md "Kubernetes via helm" for full recipes.

# -- Override the chart name (defaults to .Chart.Name).
nameOverride: ""
# -- Override the fully qualified app name (defaults to release-chart).
fullnameOverride: ""

image:
  # -- Container registry + image name. The chart does not push images;
  # build and push from infra/gateway/Dockerfile first. Common overrides:
  # `ghcr.io/your-org/metis-gateway` or `your-registry.example.com/metis-gateway`.
  repository: metis-gateway
  # -- Image tag. `latest` is a placeholder; pin to a versioned release
  # (e.g. "0.1.0") before any production deployment. See production-
  # readiness audit in docs/gateway-deployment.md.
  tag: "latest"
  # -- IfNotPresent is correct for pinned tags; Always is required if tag
  # stays "latest" so pods pick up rebuilt images.
  pullPolicy: IfNotPresent
  # -- imagePullSecrets attached to the ServiceAccount (private registries).
  pullSecrets: []

# -- Number of pod replicas. Gateway is stateless so horizontal scaling is
# safe at the request level, but every replica writes to the same trace DB.
# With a shared ReadWriteMany PVC you get accurate per-key cost rollups
# but SQLite contention will cap throughput. Keep at 1 unless you've split
# the trace DB per-replica and accept that cost rollups need cross-replica
# aggregation. HPA below can override if enabled.
replicaCount: 1

# Gateway listen host inside the pod. Default 127.0.0.1 — the proxy
# sidecar bridges this to pod-IP:proxy.listenPort for the Service to
# reach (back-compat with pre-Wave-13 charts). Set to 0.0.0.0 to skip
# the sidecar and bind the pod IP directly; remember to set
# `proxy.enabled: false` in that case. gateway-hardening.md §2.1.
gatewayHost: "127.0.0.1"

# Gateway listen port — inside the pod. When `gatewayHost` is 127.0.0.1
# (default), the proxy sidecar bridges this to pod-IP:proxy.listenPort
# for the Service to reach; the two ports MUST differ because the
# gateway and proxy share the pod's network namespace and a wildcard
# 0.0.0.0 bind claims every interface including loopback. When
# `gatewayHost` is 0.0.0.0, the sidecar is off and `gatewayPort` is
# the Service targetPort directly.
gatewayPort: 8422

# Maximum concurrent connections + in-flight requests per process
# (uvicorn limit_concurrency, gateway-hardening.md §2.2). Excess
# returns HTTP 503 immediately; right shape for a flood scenario.
maxConnections: 1000

# Worker count for multi-process operation. Default 1 (single-process
# `metis gateway`). Multi-process requires running uvicorn directly with
# --workers > 1; the bundled entrypoint.sh stays single-process to keep
# the in-process trace store + bus subscribers from competing. Recommended
# scaling pattern: increase `replicaCount` (multi-pod) rather than workers
# (multi-process per pod). Set this > 1 only after pinning the trace DB
# to an external store; SQLite WAL contention across workers in the same
# pod will cap throughput.
workers: 1

# SO_REUSEPORT on the listen socket. Single-process operation does not
# need it; multi-pod / blue-green rollouts benefit when two pods on the
# same node need to bind the same port for graceful restart. The
# kubernetes Service abstraction handles most rolling-update scenarios
# without it.
reusePort: false

# TLS-in-process (gateway-hardening.md §2.3). When `tls.enabled` is
# true, the chart mounts the named Secret containing `cert.pem` +
# `key.pem` into the gateway pod and forwards --tls-cert / --tls-key
# to the entrypoint. The Service must NOT be fronted by an additional
# TLS terminator in that case (double-TLS). Default off; sidecar
# termination via Ingress remains the recommended path.
tls:
  enabled: false
  # -- Name of an existing Secret with `cert.pem` + `key.pem` keys.
  # Use cert-manager / External Secrets Operator / SealedSecrets to
  # populate. Required when tls.enabled is true.
  secretName: ""
  # -- Mount path inside the gateway container. Cert lives at
  # `{mountPath}/cert.pem`, key at `{mountPath}/key.pem`.
  mountPath: /etc/metis/tls

# Sidecar TCP-forwarder. Default: socat listens on 0.0.0.0:proxy.listenPort
# inside the pod and forwards to 127.0.0.1:gatewayPort. This is what makes
# the Service work; without it, the gateway's loopback bind is unreachable
# from anywhere outside the container's process tree.
#
# Swap to Caddy/nginx to add TLS termination at the pod boundary; have it
# listen on proxy.listenPort and proxy_pass to 127.0.0.1:gatewayPort. The
# pod's network namespace is shared, so the proxy's `127.0.0.1:gatewayPort`
# upstream resolves to the gateway.
proxy:
  enabled: true
  # -- Port the sidecar listens on (exposed to the Service). MUST differ
  # from gatewayPort (see note above).
  listenPort: 8423
  image:
    repository: alpine/socat
    tag: "1.8.0.0"
    pullPolicy: IfNotPresent
  # -- Command + args. Default forwards TCP 0.0.0.0:listenPort →
  # 127.0.0.1:gatewayPort. Templated to track listenPort + gatewayPort
  # automatically; override here only if swapping to caddy/nginx.
  command: []
  argsTemplate:
    - "-d"
    - "-d"
    - "TCP-LISTEN:{listenPort},bind=0.0.0.0,fork,reuseaddr"
    - "TCP:127.0.0.1:{gatewayPort}"
  # -- Raw args. Leave empty to use argsTemplate; set non-empty to override
  # entirely (useful for caddy/nginx with their own config files).
  args: []
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# Service exposes the gateway in-cluster. Default ClusterIP is correct
# for anything fronted by an Ingress controller. Two ways to expose the
# gateway publicly post-Wave-13 (gateway-hardening.md §2.1):
#   1. type: ClusterIP + ingress.enabled: true — Ingress terminates TLS
#      and forwards to the Service.
#   2. type: LoadBalancer — cloud LB terminates TLS (annotations on the
#      Service drive the cert ARN / certificate-manager binding). The
#      gateway speaks plaintext to the LB over the pod network.
#   3. type: LoadBalancer + tls.enabled: true — LB passes through TCP,
#      gateway terminates TLS in-process. Avoid double-TLS.
service:
  type: ClusterIP
  # -- Port the Service exposes. Conventional gateway port stays 8422 to
  # match the docker-compose deployment; the Service's targetPort hits
  # the proxy sidecar on its proxy.listenPort.
  port: 8422
  # -- Set when type == LoadBalancer (cloud-provider annotations, etc).
  annotations: {}
  # -- Set when type == NodePort.
  nodePort: null

# Ingress is OFF by default. The gateway expects a TLS terminator in front
# of it (gateway.md §3.2). Turn this on only after pointing tls.secretName
# at a Secret holding a real cert (cert-manager, ACM-as-secret, etc).
ingress:
  enabled: false
  className: ""
  annotations: {}
  # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: gateway.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: metis-gateway-tls
  #   hosts:
  #     - gateway.example.com

# Resources: conservative defaults sized for a single-replica deployment
# handling a handful of concurrent connections. Scale up CPU when latency
# under tool-use round-trips matters; scale up memory if the trace DB is
# on the pod's emptyDir (it accumulates over the pod lifetime).
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# Autoscaling is OFF by default. Enable only after you've moved the trace
# DB to an external store or accepted per-replica trace fragmentation —
# see the production-readiness audit in docs/gateway-deployment.md.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80

# PodDisruptionBudget protects the gateway against simultaneous node drains.
# When replicaCount is 1 (default), PDB is a soft signal — a node drain
# will still cordon the pod, but cluster autoscalers / upgrade tools wait
# for a replacement to become Ready before evicting.
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 0

# NetworkPolicy: deny-by-default ingress + egress with named exceptions.
# Egress allow-list covers DNS (cluster + 53) and the public provider
# APIs the gateway must reach. NetworkPolicy cannot match on DNS names
# directly; the egress rule allows TCP 443 to any IP. Tighten with a
# service-mesh egress gateway or a CIDR allow-list if your cluster
# requires it.
networkPolicy:
  enabled: true
  # -- Selector for pods allowed to talk to the gateway Service. Default
  # allows any in-namespace pod. Empty matchLabels = "all pods in this
  # namespace". Replace with podSelector or namespaceSelector to tighten.
  ingressFromSelector:
    matchLabels: {}
  # -- Allow Pod egress to in-cluster DNS (kube-dns / CoreDNS).
  allowDnsEgress: true
  # -- Egress ports the gateway needs to reach provider APIs.
  egressPorts:
    - port: 443
      protocol: TCP

# Provider API keys. The gateway refuses to start without at least one
# (runtime.py:84). Recommended: set provider.existingSecret to the name
# of a Secret managed by your secret store (Vault / SealedSecrets /
# External Secrets Operator). Inline values exist for laptop / CI smoke.
provider:
  # -- Name of an existing Secret with ANTHROPIC_API_KEY / OPENAI_API_KEY /
  # OPENROUTER_API_KEY keys. If set, inline `provider.*ApiKey` values are
  # ignored and the chart-managed Secret is not rendered.
  existingSecret: ""
  # -- Inline keys. AT LEAST ONE must be non-empty (or existingSecret must
  # point at a Secret that has at least one). Stored in a chart-managed
  # Secret named <release>-metis-gateway-providers.
  anthropicApiKey: ""
  openaiApiKey: ""
  openrouterApiKey: ""

# Keystore: the JSON file the gateway reads at startup to validate gateway
# keys. The chart can either (a) seed it from a ConfigMap (default;
# convenient for laptop / CI / GitOps when keys are managed out-of-band)
# or (b) consume a pre-created Secret you populate via
# `metis gateway issue-key` and bundle externally.
keystore:
  # -- If set, mount this existing Secret as the keystore file. The Secret
  # MUST contain a key named "keys.json" with the keystore JSON as its
  # value. Use this with External Secrets Operator or `kubectl create
  # secret generic <name> --from-file=keys.json=./keys.json`.
  existingSecret: ""
  # -- Path the chart mounts the keystore to inside the container. Matches
  # the METIS_GATEWAY_KEYSTORE env var below.
  mountPath: /etc/metis/keys.json
  # -- Seed contents for the ConfigMap-backed keystore when existingSecret
  # is empty. The gateway REJECTS an empty `keys` array at startup, so the
  # default below is only useful for `helm template` rendering and chart
  # tests. For a real install: issue a key with `metis gateway issue-key`
  # out-of-band, wrap it in a Secret, and set `keystore.existingSecret`
  # (recipe under "Kubernetes via helm > Quickstart" in
  # docs/gateway-deployment.md).
  seed: |
    {
      "keys": []
    }

# Trace DB persistence. SQLite WAL on a PersistentVolume gives the buyer
# durable cost-attribution data across pod restarts. Disable persistence
# only for smoke / ephemeral deployments.
persistence:
  enabled: true
  # -- PVC size. The trace DB grows linearly with traffic; 1Gi is sized
  # for weeks of single-tenant developer traffic. Prune with the SQL
  # recipe in docs/gateway-deployment.md "Trace DB size management".
  size: 1Gi
  accessMode: ReadWriteOnce
  # -- StorageClass. Leave empty to use the cluster default. Set to
  # "longhorn", "ebs-sc", "csi-cinder-default", etc. as appropriate.
  storageClass: ""
  # -- Mount path inside the gateway container. Matches the
  # METIS_GATEWAY_DB_PATH env var.
  mountPath: /var/lib/metis
  dbFile: /var/lib/metis/metis.db

# Rate limiting (gateway-hardening.md §3). OFF by default in v1 — the
# in-process token-bucket limiter is opt-in until Wave 12+ promotes it to
# the recommended default. The buyer's perimeter (Caddy / nginx-ingress /
# cloud LB) is the first line of defense; this limiter enforces per-key
# fairness *inside* the perimeter so a leaked key can't drain its daily
# spend cap before the operator can rotate it.
rateLimit:
  enabled: false
  perKey:
    # -- Requests per minute per gateway key. Default 60 (sustained 1 RPS,
    # burst-capacity also 60). gateway-hardening.md §3.1.
    rpm: 60
  perIp:
    # -- Requests per minute per source IP. Default 1000. The buyer's edge
    # WAF / CDN handles volumetric DDoS — this limit catches a casual
    # scraper that bypasses the WAF.
    rpm: 1000
  # -- CIDRs the middleware treats as forwarders when parsing
  # X-Forwarded-For. Set this to your ingress controller's pod CIDR so
  # spoofed XFF headers can't bypass the per-IP bucket. Default empty:
  # only the immediate ASGI peer is trusted.
  trustedProxies: []

# Trace-DB retention sweep (trace-retention.md §8). OFF by default —
# enabling renders a Kubernetes CronJob in a separate pod that runs
# `metis trace prune --days <N>` against the trace-DB PVC on a schedule.
# Audit-flagged events (audit-log.md §AUDIT_EVENT_TYPES, including
# `trace.swept`) are preserved regardless of age.
#
# Storage gotcha: the CronJob mounts the same PVC the gateway uses. On
# ReadWriteOnce filesystems this can fail because two pods cannot mount
# the same RWO volume. Move to RWX (Longhorn, NFS, EFS) OR run the
# CronJob against a backup taken via `metis backup` OR pause the gateway
# during the sweep window. The chart does not enforce one or the other.
traceRetention:
  enabled: false
  # -- Retention cutoff in days. Default 90; matches trace-retention.md §2.1.
  days: 90
  # -- Cron schedule. Default daily at 03:00 UTC; trade off the catch-up
  # sweep window against acceptable trace-DB size.
  schedule: "0 3 * * *"
  # -- Set true to render the CronJob with `--dry-run` (no deletions, no
  # `trace.swept` event). Useful for first roll-out — flip to false once
  # the count output looks reasonable in the job logs.
  dryRun: false
  image:
    # -- Override the image. Default empty = reuse `image.repository`. Set
    # only if you ship a separate retention image (rare).
    repository: ""
    # -- Override the tag. Default empty = reuse `image.tag`.
    tag: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

# Trace-DB VACUUM (docs/operations/trace-performance.md §4). OFF by default
# — enabling renders a separate Kubernetes CronJob that runs `metis trace
# vacuum` against the trace-DB PVC on a schedule (default monthly).
# VACUUM rewrites the file in place to reclaim free pages; not strictly
# required for correctness but reclaims 10-30% of disk after a year of
# typical traffic + monthly retention sweeps.
#
# Same RWO storage gotcha as the retention CronJob above. The two
# CronJobs use independent schedules (default 03:00 daily for prune,
# 04:00 monthly on the 1st for vacuum) so they don't overlap on the
# same PVC mount.
traceVacuum:
  enabled: false
  # -- Cron schedule. Default monthly on the 1st at 04:00 UTC. VACUUM
  # rebuild scales linearly with DB size; on a 1 GB DB expect a 30-60s
  # rebuild on local SSD-backed PVCs.
  schedule: "0 4 1 * *"
  image:
    # -- Override the image. Default empty = reuse `image.repository`.
    repository: ""
    # -- Override the tag. Default empty = reuse `image.tag`.
    tag: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

# Self-serve signup (gateway.md §Self-serve signup, Wave 14). OFF by
# default — appropriate for in-VPC / self-hosted deployments where the
# operator provisions keys out-of-band via `metis gateway issue-key`.
# Flip on for SaaS-style deployments where buyers should be able to
# arrive at the gateway, create an account, get a key, and point their
# client at it without operator involvement.
#
# Magic links are logged to stdout in v1 (no email transport — Wave 15
# wires SES/SendGrid). Production deployments that flip `enabled: true`
# MUST swap in a real email sender before the gateway faces the open
# internet; the logged URL is a development affordance, not a security
# feature. The accounts file (`accountsPath`) holds plaintext email and
# the SHA-256-hashed magic-link / session tokens — back it with the same
# Secret store as the keystore for production deployments.
signup:
  enabled: false
  # -- Base URL embedded in magic-link emails / responses. Leave empty
  # to derive from the gateway's own bind URL inside the cluster; set
  # to the public hostname (e.g. https://gateway.example.com) when
  # running behind an Ingress so the verification links resolve from
  # the public internet.
  dashboardUrl: ""
  # -- Path inside the container for the accounts JSON file. The chart
  # mounts an emptyDir at the parent directory; for durable accounts
  # across pod restarts mount a PVC or Secret here instead.
  accountsPath: /var/lib/metis/accounts.json

# Global default model — slot 7 of the routing chain, only consulted when
# clients omit `model` (rare; SDKs always pass one — see gateway.md §V).
globalDefaultModel: anthropic:claude-sonnet-4-6

# Probes use `exec curl` against 127.0.0.1 inside the container because
# kubelet HTTP probes run from the node namespace and cannot reach the
# gateway's loopback bind. Override `probeType` to `httpGet` if you've
# enabled the proxy sidecar AND want kubelet HTTP probes (they hit the
# sidecar, not the gateway directly).
probes:
  type: exec
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# Pod security: drop all caps, non-root, read-only root FS. The gateway
# writes only to /var/lib/metis (PVC) and /tmp (memory-backed emptyDir).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Prometheus monitoring. Renders a `monitoring.coreos.com/v1.ServiceMonitor`
# (Prometheus operator shape) targeting the same Service port the LLM
# endpoints ride on. The gateway exposes `/metrics` unconditionally on
# 127.0.0.1; the proxy sidecar bridges it to pod-IP:proxy.listenPort the
# same way it does the LLM endpoints, so the ServiceMonitor scrape just
# rides the existing Service.
#
# The chart does NOT install Prometheus or the operator. Set
# `monitoring.enabled` to true only after `monitoring.coreos.com/v1`
# CRDs are installed in the cluster (typically via kube-prometheus-stack).
# For clusters without the operator, hand-roll a Prometheus scrape job
# pointing at <fullname>:<service.port>/metrics.
#
# See docs/specs/observability.md for the metric surface.
monitoring:
  enabled: false
  serviceMonitor:
    # -- Scrape interval. Prometheus default is 1m; 30s gives sub-minute
    # latency on counter deltas without hammering the gateway.
    interval: 30s
    # -- Per-scrape timeout. Must be < interval.
    scrapeTimeout: 10s
    # -- Namespace for the ServiceMonitor. Empty = release namespace.
    # Set to the namespace your Prometheus operator scrapes from if it
    # differs from the gateway's.
    namespace: ""
    # -- Extra labels for the operator's ServiceMonitor selector. Match
    # whatever your `Prometheus` resource's `serviceMonitorSelector` looks
    # for (kube-prometheus-stack default: `release: prometheus`).
    labels: {}
    # -- Per-target relabeling rules (drop noisy labels, rename, etc.).
    relabelings: []
    # -- Per-metric relabeling (drop high-cardinality series, etc.).
    metricRelabelings: []

# -- Extra environment variables (e.g. METIS_LOG_LEVEL).
extraEnv: []
# - name: METIS_LOG_LEVEL
#   value: INFO

# -- Extra volume mounts / volumes for sidecar TLS terminators etc.
extraVolumeMounts: []
extraVolumes: []

# -- Pod scheduling.
nodeSelector: {}
tolerations: []
affinity: {}
# -- Extra pod labels and annotations.
podLabels: {}
podAnnotations: {}
