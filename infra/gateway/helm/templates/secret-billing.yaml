{{- if and .Values.billing.enabled (not .Values.billing.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "metis-gateway.fullname" . }}-billing
  labels:
    {{- include "metis-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  stripeApiKey: {{ .Values.billing.stripeApiKey | quote }}
  stripeWebhookSecret: {{ .Values.billing.stripeWebhookSecret | quote }}
{{- end }}
