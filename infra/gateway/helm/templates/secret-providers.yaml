{{- /*
Chart-managed Secret holding provider API keys.

Only rendered when .Values.provider.existingSecret is empty. When the buyer
provides their own Secret (recommended for anything past laptop smoke),
the chart consumes it via envFrom and this resource is skipped entirely.

The gateway refuses to start without at least one of ANTHROPIC_API_KEY /
OPENAI_API_KEY / OPENROUTER_API_KEY (runtime.py:84). This template fails
the install early if all three inline values are empty, so the buyer
catches the misconfiguration at helm-install time rather than at the
first pod start.
*/ -}}
{{- if not .Values.provider.existingSecret -}}
{{- if not (or .Values.provider.anthropicApiKey .Values.provider.openaiApiKey .Values.provider.openrouterApiKey) -}}
{{- fail "set provider.existingSecret OR at least one of provider.anthropicApiKey / provider.openaiApiKey / provider.openrouterApiKey — the gateway refuses to start without a provider key" -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "metis-gateway.providerSecretName" . }}
  labels:
    {{- include "metis-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.provider.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.provider.openaiApiKey }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.provider.openrouterApiKey }}
  OPENROUTER_API_KEY: {{ . | quote }}
  {{- end }}
{{- end }}
