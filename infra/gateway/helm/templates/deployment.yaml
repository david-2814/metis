apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "metis-gateway.fullname" . }}
  labels:
    {{- include "metis-gateway.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "metis-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "metis-gateway.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/keystore: {{ include (print $.Template.BasePath "/configmap-keystore.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "metis-gateway.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: gateway
              containerPort: {{ .Values.gatewayPort }}
              # Note: the gateway binds 127.0.0.1 inside the pod; this
              # containerPort is documentation. The proxy sidecar (below)
              # is what actually accepts traffic on the pod IP.
          env:
            - name: METIS_GATEWAY_HOST
              value: {{ default "127.0.0.1" .Values.gatewayHost | quote }}
            - name: METIS_GATEWAY_PORT
              value: {{ .Values.gatewayPort | quote }}
            - name: METIS_GATEWAY_KEYSTORE
              value: {{ .Values.keystore.mountPath | quote }}
            - name: METIS_GATEWAY_DB_PATH
              value: {{ .Values.persistence.dbFile | quote }}
            - name: METIS_GATEWAY_GLOBAL_DEFAULT
              value: {{ .Values.globalDefaultModel | quote }}
            - name: METIS_GATEWAY_MAX_CONNECTIONS
              value: {{ .Values.maxConnections | default 1000 | quote }}
            {{- if .Values.reusePort }}
            - name: METIS_GATEWAY_REUSE_PORT
              value: "1"
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: METIS_GATEWAY_TLS_CERT
              value: {{ printf "%s/cert.pem" .Values.tls.mountPath | quote }}
            - name: METIS_GATEWAY_TLS_KEY
              value: {{ printf "%s/key.pem" .Values.tls.mountPath | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "metis-gateway.providerSecretName" . }}
          volumeMounts:
            - name: keystore
              mountPath: {{ .Values.keystore.mountPath }}
              subPath: keys.json
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if eq .Values.probes.type "exec" }}
          livenessProbe:
            exec:
              command:
                - curl
                - --fail
                - --silent
                - --show-error
                - {{ printf "http://127.0.0.1:%d/healthz" (int .Values.gatewayPort) | quote }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - curl
                - --fail
                - --silent
                - --show-error
                - {{ printf "http://127.0.0.1:%d/healthz" (int .Values.gatewayPort) | quote }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- else }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
        {{- if .Values.proxy.enabled }}
        - name: proxy
          image: "{{ .Values.proxy.image.repository }}:{{ .Values.proxy.image.tag }}"
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.proxy.containerSecurityContext | nindent 12 }}
          {{- with .Values.proxy.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            {{- if .Values.proxy.args }}
            {{- toYaml .Values.proxy.args | nindent 12 }}
            {{- else }}
            {{- range .Values.proxy.argsTemplate }}
            - {{ . | replace "{listenPort}" (printf "%d" (int $.Values.proxy.listenPort)) | replace "{gatewayPort}" (printf "%d" (int $.Values.gatewayPort)) | quote }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.proxy.listenPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.proxy.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: keystore
          {{- if .Values.keystore.existingSecret }}
          secret:
            secretName: {{ .Values.keystore.existingSecret }}
            items:
              - key: keys.json
                path: keys.json
          {{- else }}
          configMap:
            name: {{ include "metis-gateway.keystoreConfigMapName" . }}
            items:
              - key: keys.json
                path: keys.json
          {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "metis-gateway.pvcName" . }}
        {{- end }}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ required "tls.secretName is required when tls.enabled is true" .Values.tls.secretName }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
