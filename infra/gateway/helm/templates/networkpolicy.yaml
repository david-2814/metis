{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "metis-gateway.fullname" . }}
  labels:
    {{- include "metis-gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "metis-gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            {{- toYaml .Values.networkPolicy.ingressFromSelector | nindent 12 }}
      ports:
        - port: http
          protocol: TCP
  egress:
    {{- if .Values.networkPolicy.allowDnsEgress }}
    # Allow DNS resolution to in-cluster CoreDNS / kube-dns.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- end }}
    # Egress to provider APIs (Anthropic / OpenAI / OpenRouter) on TLS.
    # NetworkPolicy cannot match on DNS names; this allows TCP 443 to any
    # destination. Tighten with a service-mesh egress gateway or a CIDR
    # allow-list if your cluster requires it.
    - to: []
      ports:
        {{- toYaml .Values.networkPolicy.egressPorts | nindent 8 }}
{{- end }}
