{{- /*
ConfigMap holding the seed keystore JSON. Used only when
.Values.keystore.existingSecret is empty.

Real keys are issued out-of-band with `metis gateway issue-key` (the
plaintext token is printed once; only the SHA-256 hash is persisted).
For production deployments, switch to .Values.keystore.existingSecret and
manage the keystore content via your secret store (External Secrets
Operator / SealedSecrets / Vault).
*/ -}}
{{- if not .Values.keystore.existingSecret -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "metis-gateway.keystoreConfigMapName" . }}
  labels:
    {{- include "metis-gateway.labels" . | nindent 4 }}
data:
  keys.json: |-
{{ .Values.keystore.seed | indent 4 }}
{{- end }}
