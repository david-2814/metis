name: Deploy product site

# Build and deploy the marketing site on every push to main that touches
# product-site/. Uses OIDC to assume the CDK-managed deploy role — no static
# AWS keys live in this repo's secrets.

on:
  push:
    branches: [main]
    paths:
      - "product-site/**"
      - ".github/workflows/deploy-product-site.yml"
  workflow_dispatch: {}

# OIDC requires id-token: write. Read-only content for everything else.
permissions:
  id-token: write
  contents: read

# Block concurrent deploys so a slower run can't overwrite a faster one.
concurrency:
  group: deploy-product-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: product-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: product-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync dist/ "s3://${{ secrets.AWS_SITE_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.html"
          # HTML must revalidate so we never serve stale shells pointing at
          # old hashed assets.
          aws s3 sync dist/ "s3://${{ secrets.AWS_SITE_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.AWS_DISTRIBUTION_ID }}" \
            --paths "/*"
