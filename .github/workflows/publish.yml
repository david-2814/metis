name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishers (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Build distribution
        working-directory: packages/metis
        # uv build in a workspace member defaults to writing artifacts to the
        # workspace-root `dist/`, not the member's `dist/`. Pin explicitly so
        # the Publish step's packages-dir below finds them.
        run: uv build --out-dir dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/metis/dist
          skip-existing: true
