name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Sync workspace
        run: uv sync --frozen

      - name: Lint with ruff
        run: uv run ruff check packages scripts

      - name: Type check (optional, non-blocking)
        run: uv run mypy packages/metis/src/metis || true
        continue-on-error: true

      - name: Run tests
        run: uv run pytest -q --tb=short
